name: update bot
on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  check-time:
    runs-on: self-hosted
    outputs:
      should_update: ${{ steps.timer.outputs.should_update }}
    steps:
      - name: Check Maintenance Window
        id: timer
        run: |
          # 获取当前 UTC 小时
          CURRENT_HOUR=$(date -u +%H)
          echo "Current UTC hour: $CURRENT_HOUR"
          
          # 北京时间 02:00-04:00 对应 UTC 18:00-20:00
          if [ "$CURRENT_HOUR" -ge 18 ] && [ "$CURRENT_HOUR" -lt 20 ]; then
            echo "当前处于维护时间段 (北京时间 02:00-04:00)，将跳过更新步骤。"
            echo "should_update=false" >> $GITHUB_OUTPUT
          else
            echo "should_update=true" >> $GITHUB_OUTPUT
          fi
  build:
    needs: check-time
    runs-on: self-hosted
    if: |
      needs.check-time.outputs.should_update == 'true' &&
      !contains(github.event.head_commit.message, '[skip-build]') &&
      !contains(github.event.head_commit.message, '[ci-skip]')
    env:
      MAVEN_OPTS: --enable-preview
    steps:
      - name: Set up repository
        run: |
          cd ~/nowbot
          git fetch --all
          git reset --hard origin/master
          git pull
          git lfs pull
      - name: Build project
        run: |
          cd ~/nowbot
          # 别急吧每次都 clean 了，编译一次一小时
          # mvnd clean
          
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [ -f .last_branch ] && [ "$(cat .last_branch)" != "$CURRENT_BRANCH" ]; then
            echo "分支切换，清理缓存"
            rm -rf target/classes/
          fi
          echo "$CURRENT_BRANCH" > .last_branch
          mvnd package
  update:
    runs-on: self-hosted
    needs: [build, check-time]
    if: needs.build.result == 'success'
    steps:
      - name: Update
        run: |
          cd ~/nowbot

          JAR_FILE="target/nowbot-linux.jar"
          
          if [ ! -f "$JAR_FILE" ]; then
            echo "错误：JAR文件不存在: $JAR_FILE"
            exit 1
          fi
          
          cp "$JAR_FILE" ~/work/nowbot-linux.jar
          
          sudo systemctl stop nowbot
          sleep 5
          sudo systemctl start nowbot
